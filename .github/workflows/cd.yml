name: Terraform + Ansible Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      AWS_REGION: eu-west-3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: exposed-deploy/terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: exposed-deploy/terraform
        run: terraform validate

      - name: Terraform Plan
        working-directory: exposed-deploy/terraform
        run: terraform plan
      - name : Terraform Apply
        working-directory: exposed-deploy/terraform
        run: terraform apply -auto-approve
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible boto3 botocore

      - name: Create Vault password file
        working-directory: exposed-deploy/ansible
        run: |
          echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > vault-password.txt
          chmod 600 vault-password.txt

      - name: Fix SSH key permissions
        working-directory: exposed-deploy/ansible
        run: |
          chmod 400 ../terraform/ansible-key.pem

      - name: Run Ansible
        working-directory: exposed-deploy/ansible
        run: |
          ansible-playbook \
            -i inventory/aws_ec2.yml \
            deploy.yml \
            --vault-password-file vault-password.txt \
            --private-key ../terraform/ansible-key.pem