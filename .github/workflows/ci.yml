name: CI

permissions:
  contents: read
  packages: write

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: backend
        run: mvn -B clean package

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar


  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
  

      - name: Install dependencies 
        working-directory: frontend
        run: npm install 
      - name: Build frontend
        working-directory: frontend
        run: npx @angular/cli@latest build --configuration docker-production

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  docker:
    needs: [backend, frontend]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend/target/

      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build frontend image 
        run: docker build -t ghcr.io/abdessayedala666/frontend:latest frontend
      - name: build backend image 
        run: docker build -t ghcr.io/abdessayedala666/backend:latest backend
      - name: build nginx image 
        run: docker build -t ghcr.io/abdessayedala666/nginx:latest nginx
      - name: Push frontend
        run: docker push ghcr.io/abdessayedala666/frontend:latest
      - name: Push backend
        run: docker push ghcr.io/abdessayedala666/backend:latest
      - name: Push nginx
        run: docker push ghcr.io/abdessayedala666/nginx:latest
