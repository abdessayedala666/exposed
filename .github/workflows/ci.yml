name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
# =========================
# BACKEND (Spring Boot)
# =========================
  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
          cache: maven

      - name: Build + Test
        working-directory: backend
        run: mvn clean verify

      # =====================
      # SONARQUBE (CODE QUALITY)
      # =====================
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4
        with:
          args: >
            -Dsonar.projectKey=your_project
            -Dsonar.sources=backend

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar
  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint || true

      - name: NPM Security Audit
        working-directory: frontend
        run: npm audit --audit-level=high

      - name: Build Angular
        working-directory: frontend
        run: npx ng build --configuration docker-production

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
  docker:
    needs: [backend, frontend]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # =========================
      # DOWNLOAD ARTIFACTS
      # =========================
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend/target/

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      # =========================
      # LOGIN TO REGISTRY
      # =========================
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # =========================
      # BUILD IMAGES
      # =========================
      - name: Build backend image
        run: docker build -t ghcr.io/${{ github.repository }}/backend:latest backend

      - name: Build frontend image
        run: docker build -t ghcr.io/${{ github.repository }}/frontend:latest frontend

      - name: Build nginx image
        run: docker build -t ghcr.io/${{ github.repository }}/nginx:latest nginx

      # =========================
      # SECURITY SCAN (TRIVY)
      # =========================
      - name: Scan backend image
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ghcr.io/${{ github.repository }}/backend:latest
          format: table
          exit-code: 1

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ghcr.io/${{ github.repository }}/frontend:latest
          format: table
          exit-code: 1

      - name: Scan nginx image
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ghcr.io/${{ github.repository }}/nginx:latest
          format: table
          exit-code: 1

      # =========================
      # PUSH IMAGES (ONLY IF SCAN PASSES)
      # =========================
      - name: Push backend image
        run: docker push ghcr.io/${{ github.repository }}/backend:latest

      - name: Push frontend image
        run: docker push ghcr.io/${{ github.repository }}/frontend:latest

      - name: Push nginx image
        run: docker push ghcr.io/${{ github.repository }}/nginx:latest